# Config for benchmark_optimizer.py
# Only includes settings relevant to the optimizer step benchmark.
# Training, data, wandb, and checkpointing settings are omitted.

# — Model —
model_dim: 2048
n_layer: 4
n_head: 16
use_bias: false
sequence_length: 1024

# — Optimizer —
optimizer: dion2
scalar_opt: adamw
lr: 0.02
mu: 0.95
weight_decay: 0.01
ortho_fraction: 1.0
adjust_lr: spectral_norm

# — Distributed —
fs_size: null
